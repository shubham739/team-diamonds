[project]
name = "jira-service"
version = "0.1.0"
description = "FastAPI service for Jira work management with OAuth2 authentication"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.100.0",
    "uvicorn[standard]>=0.41.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "jira-client-impl",
    "work-mgmt-client-interface",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.4.1",
    "pytest-cov>=6.2.1",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jira_service"]

[tool.hatch.build.targets.wheel.force-include]
"src/jira_service/py.typed" = "jira_service/py.typed"

[tool.pytest.ini_options]
pythonpath = [".", "src"]
testpaths = ["tests", "src"]
addopts = ["--cov", "--cov-report=term-missing"]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]

[tool.uv.sources]
jira-client-impl = { workspace = true }
work-mgmt-client-interface = { workspace = true }
