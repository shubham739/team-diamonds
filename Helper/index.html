<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Relay — Slack ↔ Jira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:           oklch(0.985 0.003 90);
    --bg-elev:      oklch(1    0     0);
    --bg-sunken:    oklch(0.965 0.004 80);
    --ink:          oklch(0.22  0.012 60);
    --ink-2:        oklch(0.42  0.010 60);
    --ink-3:        oklch(0.58  0.008 60);
    --ink-4:        oklch(0.74  0.006 60);
    --line:         oklch(0.92  0.006 80);
    --accent:       #C26E4F;
    --accent-soft:  color-mix(in oklab, var(--accent) 14%, transparent);

    --ok:   oklch(0.62 0.13 155);
    --warn: oklch(0.72 0.14 75);
    --bad:  oklch(0.60 0.18 25);

    --r-1: 6px;
    --r-2: 10px;
    --r-3: 14px;

    --pad-x: clamp(20px, 5vw, 56px);
    --row-h: 38px;

    --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial;
    --font-mono: "Geist Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg:        oklch(0.18 0.008 60);
    --bg-elev:   oklch(0.22 0.008 60);
    --bg-sunken: oklch(0.15 0.008 60);
    --ink:       oklch(0.96 0.004 80);
    --ink-2:     oklch(0.78 0.006 80);
    --ink-3:     oklch(0.62 0.008 70);
    --ink-4:     oklch(0.45 0.008 70);
    --line:      oklch(0.30 0.010 65);
  }
  html[data-density="compact"] { --row-h: 32px; }
  html[data-density="comfy"]   { --row-h: 46px; }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  body { font-size: 14px; letter-spacing: -0.005em; line-height: 1.5; }
  ::selection { background: var(--accent-soft); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: default; }

  .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; letter-spacing: -0.01em; }
  .num  { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* ─── Site shell ─── */
  .nav {
    display:flex; align-items:center; gap: 18px;
    padding: 18px var(--pad-x);
    border-bottom: 1px solid var(--line);
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .brand {
    display:flex; align-items:center; gap:9px;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--ink); position: relative; flex: none;
  }
  .brand-mark::before, .brand-mark::after {
    content: ""; position: absolute; background: var(--bg);
    border-radius: 1px;
  }
  .brand-mark::before { left:5px; top:5px; width:5px; height:12px; }
  .brand-mark::after  { left:12px; top:5px; width:5px; height:12px; opacity:.55; }
  .brand-name { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .brand-tag  { color: var(--ink-3); font-size: 11px; padding: 1px 6px; border:1px solid var(--line); border-radius: 4px; }

  .nav-links { display:flex; gap: 4px; margin-left: 12px; }
  .nav-links a {
    padding: 6px 10px; border-radius: 6px; font-size: 13px; color: var(--ink-2);
  }
  .nav-links a:hover { background: var(--bg-sunken); color: var(--ink); }
  .nav-links a.on { color: var(--ink); font-weight: 500; }
  .nav-spacer { flex: 1; }

  .pill {
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 10px; border:1px solid var(--line); border-radius: 999px;
    color: var(--ink-2); font-size: 12px;
  }
  .pill .dot { width:6px; height:6px; border-radius:50%; background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 22%, transparent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.55 } }

  .ava {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: white;
    display:grid; place-items:center; font-size: 11.5px; font-weight: 600;
  }

  /* ─── Page ─── */
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px var(--pad-x) 80px;
  }
  .hero { margin-bottom: 56px; }
  .hero h1 {
    font-size: clamp(30px, 4.4vw, 44px); font-weight: 600; letter-spacing: -0.03em;
    margin: 0 0 14px; line-height: 1.05;
    text-wrap: pretty;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p {
    font-size: 16px; color: var(--ink-2); max-width: 56ch;
    margin: 0; text-wrap: pretty;
  }

  /* ─── Sections ─── */
  .section { margin: 48px 0; }
  .section-head {
    display:flex; align-items: baseline; justify-content: space-between; gap: 16px;
    margin-bottom: 18px;
  }
  .section-head h2 {
    font-size: 18px; font-weight: 600; letter-spacing: -0.015em;
    margin: 0;
  }
  .section-head .meta { font-size: 12.5px; color: var(--ink-3); }
  .section-head .actions { display:flex; gap: 8px; }
  .section-sub {
    font-size: 13.5px; color: var(--ink-3); margin: -10px 0 18px; max-width: 60ch;
  }

  /* ─── Card ─── */
  .card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
  }
  .card.flat { background: transparent; }

  /* ─── Buttons ─── */
  .btn {
    appearance: none; border: 1px solid var(--line); background: var(--bg-elev);
    color: var(--ink); padding: 0 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    height: 34px; display: inline-flex; align-items: center; gap: 7px;
    transition: background 0.12s ease;
  }
  .btn:hover { background: var(--bg-sunken); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: color-mix(in oklab, var(--ink) 86%, var(--bg)); }
  .btn.danger { color: var(--bad); border-color: color-mix(in oklab, var(--bad) 25%, var(--line)); }
  .btn.danger:hover { background: color-mix(in oklab, var(--bad) 8%, var(--bg-elev)); }
  .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
  .btn.ghost { border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--bg-sunken); color: var(--ink); }

  /* ─── Connected services ─── */
  .svcs { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .svcs { grid-template-columns: 1fr; } }

  .svc {
    padding: 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
  }
  .lm {
    width: 44px; height: 44px; border-radius: 11px;
    display: grid; place-items: center;
    font-weight: 600; font-size: 16px; letter-spacing: -0.01em;
    flex: none;
  }
  .lm-slack { background: oklch(0.95 0.04 320); color: oklch(0.40 0.16 320); }
  .lm-jira  { background: oklch(0.95 0.04 240); color: oklch(0.42 0.18 250); }
  .lm-or    { background: oklch(0.95 0.03 250); color: oklch(0.40 0.14 260); }
  html[data-theme="dark"] .lm-slack { background: oklch(0.30 0.08 320); color: oklch(0.85 0.10 320); }
  html[data-theme="dark"] .lm-jira  { background: oklch(0.30 0.08 240); color: oklch(0.85 0.12 250); }
  html[data-theme="dark"] .lm-or    { background: oklch(0.30 0.06 250); color: oklch(0.85 0.10 260); }

  .svc .ttl { font-size: 15px; font-weight: 500; line-height: 1.2; }
  .svc .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 4px; }
  .svc .meta-row {
    display:flex; gap: 14px; margin-top: 10px;
    font-size: 12px; color: var(--ink-3);
  }
  .svc .meta-row b { color: var(--ink-2); font-weight: 500; }

  .svc .status {
    display:inline-flex; align-items:center; gap: 6px;
    font-size: 12px; padding: 3px 10px; border-radius: 999px;
    background: color-mix(in oklab, var(--ok) 12%, transparent);
    color: color-mix(in oklab, var(--ok) 60%, var(--ink));
    font-weight: 500;
  }
  .svc .status .d { width:6px; height:6px; border-radius:50%; background: var(--ok); }
  .svc .status.off {
    background: var(--bg-sunken);
    color: var(--ink-3);
  }
  .svc .status.off .d { background: var(--ink-4); animation: none; }
  .svc .right { display:flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  /* ─── Recent commands ─── */
  .rc-h, .rc-r {
    display: grid;
    grid-template-columns: 76px 150px 1fr 130px 78px;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
  }
  .rc-h { color: var(--ink-3); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--line); }
  .rc-r { border-top: 1px solid var(--line); font-size: 13px; min-height: var(--row-h); }
  .rc-r:first-of-type { border-top: 0; }
  .rc-r:hover { background: var(--bg-sunken); }
  .rc-r .when { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); }
  .rc-r .who { display:flex; align-items:center; gap: 8px; min-width: 0; }
  .rc-r .who-ava { width: 20px; height: 20px; border-radius: 50%; flex: none; display:grid; place-items: center; color: white; font-size: 9.5px; font-weight: 600; }
  .rc-r .who-name { font-size: 12.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rc-r .who-ch { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rc-r .cmd { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rc-r .res { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rc-r .res .iss { color: var(--accent); }
  .rc-st {
    display:inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    font-family: var(--font-mono); letter-spacing: 0.01em;
  }
  .rc-st .d { width: 5px; height: 5px; border-radius: 50%; }
  .rc-st.ok    { background: color-mix(in oklab, var(--ok) 12%, transparent);   color: color-mix(in oklab, var(--ok) 60%, var(--ink)); }
  .rc-st.ok    .d { background: var(--ok); }
  .rc-st.run   { background: color-mix(in oklab, var(--accent) 14%, transparent); color: color-mix(in oklab, var(--accent) 60%, var(--ink)); }
  .rc-st.run   .d { background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  .rc-st.fail  { background: color-mix(in oklab, var(--bad) 12%, transparent);  color: color-mix(in oklab, var(--bad) 60%, var(--ink)); }
  .rc-st.fail  .d { background: var(--bad); }

  /* ─── Sessions ─── */
  .sess-h, .sess-r {
    display: grid;
    grid-template-columns: 28px 1fr 180px 130px 100px 110px;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
  }
  .sess-h { color: var(--ink-3); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--line); }
  .sess-r { border-top: 1px solid var(--line); font-size: 13px; min-height: var(--row-h); }
  .sess-r:first-of-type { border-top: 0; }
  .sess-r:hover { background: var(--bg-sunken); }
  .sess-ava {
    width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 600; color: white;
  }
  .sess-name { font-weight: 500; font-size: 13px; }
  .sess-handle { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
  .sess-r .ch { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
  .sess-r .since { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); }
  .sess-r .calls { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
  .sess-r .term { display: flex; justify-content: flex-end; }
  .sess-empty { padding: 28px 20px; color: var(--ink-3); font-size: 13px; text-align: center; }

  /* ─── Usage ─── */
  .usage-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }
  @media (max-width: 860px) { .usage-grid { grid-template-columns: 1fr; } }

  .usage-stat-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--line);
  }
  .usage-stat {
    padding: 16px 20px;
    border-right: 1px solid var(--line);
  }
  .usage-stat:last-child { border-right: 0; }
  .usage-stat .k { font-size: 11.5px; color: var(--ink-3); margin-bottom: 6px; letter-spacing: 0.02em; }
  .usage-stat .v { font-size: 22px; font-weight: 600; letter-spacing: -0.025em; line-height: 1; }
  .usage-stat .v .u { color: var(--ink-3); font-weight: 500; font-size: 13px; margin-left: 4px; }
  .usage-stat .d { margin-top: 6px; font-size: 11.5px; color: var(--ink-3); }

  .usage-head { padding: 18px 20px 8px; }
  .usage-head .t { font-size: 14px; font-weight: 500; }
  .usage-head .s { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .usage-head .pill { float: right; margin-top: -2px; }

  .chart {
    display: grid;
    grid-template-columns: repeat(30, 1fr);
    align-items: end;
    height: 140px;
    gap: 3px;
    padding: 0 20px 4px;
  }
  .bar { display:block; width: 100%; border-radius: 2px 2px 0 0; background: var(--accent-soft); position: relative; }
  .bar .fill { position: absolute; left: 0; right: 0; bottom: 0; background: var(--accent); border-radius: 2px 2px 0 0; }
  .x-ax {
    display: grid; grid-template-columns: repeat(5, 1fr);
    font-size: 10.5px; color: var(--ink-3);
    padding: 8px 20px 16px; border-top: 1px solid var(--line); margin-top: 2px;
  }

  /* token spend / model breakdown */
  .tok {
    padding: 18px 20px 6px;
  }
  .tok-h { font-size: 14px; font-weight: 500; margin: 0 0 14px; display:flex; justify-content:space-between; align-items: baseline; }
  .tok-h .s { color: var(--ink-3); font-size: 12px; font-weight: 400; }
  .tok-bar-stack {
    display: flex; height: 8px; border-radius: 4px; overflow: hidden;
    background: var(--bg-sunken); margin-bottom: 14px;
  }
  .tok-bar-stack i { display: block; height: 100%; }
  .tok-list { display: flex; flex-direction: column; gap: 9px; padding-bottom: 14px; }
  .tok-row { display: grid; grid-template-columns: 8px 1fr auto auto; gap: 10px; align-items: center; font-size: 12.5px; }
  .tok-row .sw { width: 8px; height: 8px; border-radius: 2px; }
  .tok-row .nm { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
  .tok-row .pv { color: var(--ink-3); font-size: 11px; margin-left: 6px; }
  .tok-row .v { color: var(--ink-2); font-family: var(--font-mono); font-size: 12px; }
  .tok-row .pct { color: var(--ink-3); font-family: var(--font-mono); font-size: 11.5px; min-width: 38px; text-align: right; }

  /* footer */
  .foot {
    margin-top: 80px; padding-top: 22px;
    border-top: 1px solid var(--line);
    display:flex; align-items:center; justify-content: space-between; gap: 14px;
    color: var(--ink-3); font-size: 12px;
  }
  .foot .links { display:flex; gap: 16px; }
  .foot a:hover { color: var(--ink); }

  svg { display: block; }
</style>
</head>
