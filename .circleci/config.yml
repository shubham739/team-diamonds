# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

jobs:
  
  # Job 1: Setup environment
  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: "Install uv and add to path"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version
      - run:
          name: "Create venv and install dependencies"
          command: |
            uv venv --python 3.12
            source .venv/bin/activate
            uv sync --all-packages --extra dev --verbose
      - run:
          name: "Verify Installation (Optional)"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            pytest --version
            mypy --version
            coverage --version
      - persist_to_workspace:
          root: .
          paths:
            - .
  
  # Job 2: Linting and formatting checks
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Run linting and formatting checks"
          command: |
            source .venv/bin/activate
            ruff check .
  
  # Job 3: Run unit tests and get coverage
  unit_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and create test results directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
      - run:
          name: "Execute unit test suite"
          command: |
            source .venv/bin/activate  
            pytest components/ --cov=components --cov-report=xml --cov-report=term \
                     --junitxml=test-results/unit/junit.xml \
                     --cov-fail-under=84
      - run:
          name: "Run Static Analysis (mypy)"
          command: |
            source .venv/bin/activate
            uv add types-requests
            mypy components/ --explicit-package-bases
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: coverage.xml
      - store_artifacts:
          path: test-results/unit
  
  # Job 4: CircleCI Integration Tests (All Tests Except Local Credentials)
  circleci_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/circleci
      - run:
          name: "Execute All Tests Except Local Credentials"
          command: |
            source .venv/bin/activate
            pytest components/ tests/ -m "not local_credentials" \
                   --junitxml=test-results/circleci/junit.xml -v \
                   --cov=components --cov-report=term
      - store_test_results:
          path: test-results/circleci
      - store_artifacts:
          path: test-results/circleci

  # Job 5: Integration Tests with Real Credentials
  integration_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Verify Environment Variables"
          command: |
            echo "Checking for required environment variables..."
            if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_API_TOKEN" ] || [ -z "$JIRA_USER_EMAIL" ]; then
              echo "WARNING: Missing Jira environment variables. Integration tests may be skipped."
              echo "Required: JIRA_BASE_URL, JIRA_API_TOKEN, JIRA_USER_EMAIL"
            else
              echo "All required environment variables are present."
            fi
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
      - run:
          name: "Execute Integration Test Suite with Real API Calls"
          command: |
            source .venv/bin/activate
            pytest -m "integration and not local_credentials" \
                   --junitxml=test-results/integration/junit.xml -v \
                   --no-cov
      - store_test_results:
          path: test-results/integration
      - store_artifacts:
          path: test-results/integration

  # Job 6: Deploy to AWS Lambdas and S3 bucket
  deploy:
    docker:
      - image: cimg/python:3.12-node #node needed as well for building frontend library
    environment:
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Install AWS CLI & uv"
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
      - run:
            name: Get AWS SSM parameters
            command: |
              ACTION_LAMBDA=$(aws ssm get-parameter --name "action-lambda" --query "Parameter.Value" --output text)
              FRONT_END_BUCKET=$(aws ssm get-parameter --name "front-end-bucket" --query "Parameter.Value" --output text)
              CLOUDFRONT_DISTRIBUTION_ID=$(aws ssm get-parameter --name "cloudfront-distribution-id" --query "Parameter.Value" --output text)
              COGNITO_AUTHORITY_URL=$(aws ssm get-parameter --name "/frontend/cognito/authority_url" --query "Parameter.Value" --output text)
              COGNITO_CLIENT_ID=$(aws ssm get-parameter --name "/frontend/cognito/client_id" --query "Parameter.Value" --output text)
              MAIN_URI=$(aws ssm get-parameter --name "website-url" --query "Parameter.Value" --output text)
              API_URL=$(aws ssm get-parameter --name "team-diamonds-api-url" --query "Parameter.Value" --output text)

              echo "export ACTION_LAMBDA=$ACTION_LAMBDA" >> $BASH_ENV 
              echo "export FRONT_END_BUCKET=$FRONT_END_BUCKET" >> $BASH_ENV 
              echo "export CLOUDFRONT_DISTRIBUTION_ID=$CLOUDFRONT_DISTRIBUTION_ID" >> $BASH_ENV
              echo "export COGNITO_AUTHORITY_URL=$COGNITO_AUTHORITY_URL" >> $BASH_ENV
              echo "export COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> $BASH_ENV
              echo "export MAIN_URI=$MAIN_URI" >> $BASH_ENV  
              echo "export API_URL=$API_URL" >> $BASH_ENV

      - run:
          name: "Package Lambda zip"
          command: |
            export PATH="$HOME/.cargo/bin:$PATH"
            source .venv/bin/activate
            mkdir -p lambda_package

            # Copy source code to lambda_package
            cp -r components/chat_to_issues_integration/src/* lambda_package/
            cp -r components/jira_client_impl/src/* lambda_package/
            cp -r components/jira_service/src/* lambda_package/
            cp -r components/jira_service_api_client/* lambda_package/
            cp components/jira_service/src/jira_service/handler.py lambda_package/
            
            uv pip install "git+https://github.com/tatyanacthomas/ospd_issue_tracker.git@main" --target lambda_package/
            uv pip install "git+https://github.com/tatyanacthomas/llm_integration_api.git@main" --target lambda_package/
            uv pip install "git+https://github.com/HarshithKoriRaj/CS-GY-9223-Open-Source.git@main#subdirectory=components/chat_client_api" --target lambda_package/
            
            echo "--- lambda_package contents ---"
            ls -la lambda_package/
            find lambda_package/ -name "_pydantic_core*.so" | head -5
            cd lambda_package && zip -r ../deployment.zip . && cd ..
            ls -la deployment.zip
      - run:
          name: "Deploy to Action Lambda"
          command: |
            source $BASH_ENV
            aws lambda update-function-configuration \
              --function-name $ACTION_LAMBDA \
              --runtime python3.12 \
              --region us-east-2 \
              > /dev/null

            aws lambda wait function-updated \
              --function-name $ACTION_LAMBDA \
              --region us-east-2

            aws lambda update-function-code \
              --function-name $ACTION_LAMBDA \
              --zip-file fileb://deployment.zip \
              --region us-east-2 \
              > /dev/null

            aws lambda wait function-updated \
              --function-name $ACTION_LAMBDA \
              --region us-east-2
            
            echo "Action Lambda deploy complete."
      - run:
          name: "Deploy to Front end bucket."
          command: |
            source $BASH_ENV
            echo "$(ls -la .)"
            cd frontend
            
            echo "VITE_COGNITO_AUTHORITY_URL=$COGNITO_AUTHORITY_URL" >> .env
            echo "VITE_COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> .env
            echo "VITE_MAIN_URI=$MAIN_URI" >> .env
            echo "VITE_API_URL=$API_URL" >> .env

            # build frontend
            npm install
            npm run build

            # deploy frontend to s3 bucket
            aws s3 sync dist/ s3://$FRONT_END_BUCKET/ --delete

            # invalidate prior cloudfront cache so they pull new frontend
            aws cloudfront create-invalidation \
              --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
              --paths "/*"

            echo "Front end bucket deploy complete."
 
  # Job 7: Report Summary
  report_summary:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Summarize Unit Test Results"
          command: |
            echo "--- Unit Test Summary ---"
            if [ -f test-results/unit/junit.xml ]; then
              echo "Unit test results file found."
              if command -v xmllint > /dev/null; then
                tests=$(xmllint --xpath "string(//testsuite/@tests)" test-results/unit/junit.xml 2>/dev/null || echo "N/A")
                failures=$(xmllint --xpath "string(//testsuite/@failures)" test-results/unit/junit.xml 2>/dev/null || echo "N/A")
                echo "Tests: $tests, Failures: $failures"
              fi
            else
              echo "Unit test results file not found."
            fi
      - run:
          name: "Summarize CircleCI Test Results"
          command: |
            echo "--- CircleCI Test Summary ---"
            if [ -f test-results/circleci/junit.xml ]; then
              echo "CircleCI test results file found."
            else
              echo "CircleCI test results file not found."
            fi
      - run:
          name: "Summarize Integration Test Results"
          command: |
            echo "--- Integration Test Summary ---"
            if [ -f test-results/integration/junit.xml ]; then
              echo "Integration test results file found."
            else
              echo "Integration test results file not found."
            fi
      - run:
          name: "Display Coverage Info"
          command: |
            echo "--- Coverage Summary ---"
            if [ -f coverage.xml ]; then
              echo "Coverage XML found. Check artifacts for details."
              if command -v xmllint > /dev/null; then
                coverage_rate=$(xmllint --xpath "string(//coverage/@line-rate)" coverage.xml 2>/dev/null || echo "N/A")
                echo "Line Coverage Rate: $coverage_rate"
              fi
            else
              echo "Coverage XML not found."
            fi

workflows:
  # Runs on all branches except main and develop
  build_and_test:
    jobs:
      - build:
          filters:
            branches:
              ignore:
                - main
                - tct297/hw3/verification_copy
      - lint:
          requires:
            - build
          filters:
            branches:
              ignore:
                - main
                - tct297/hw3/verification_copy
      - unit_test:
          requires:
            - build
          filters:
            branches:
              ignore:
                - main
                - tct297/hw3/verification_copy
      - circleci_test:
          requires:
            - unit_test
          filters:
            branches:
              ignore:
                - main
                - tct297/hw3/verification_copy
      - report_summary:
          requires:
            - unit_test
            - circleci_test
          filters:
            branches:
              ignore:
                - main
                - tct297/hw3/verification_copy

  # Full tests + deploy
  full_integration:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - lint:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - unit_test:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - circleci_test:
          requires:
            - unit_test
          context: jira-client
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - integration_test:
          requires:
            - circleci_test
          context: jira-client
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - report_summary:
          requires:
                - main
                - tct297/hw3/verification_copy
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy
      - deploy:
          requires:
            - report_summary
          context: aws-deploy
          filters:
            branches:
              only:
                - main
                - tct297/hw3/verification_copy