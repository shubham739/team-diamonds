# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

jobs:
  
  # Job 1: Setup environment
  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: "Install uv and add to path"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version
      - run:
          name: "Create venv and install dependencies"
          command: |
            uv venv --python 3.12
            source .venv/bin/activate
            uv sync --all-packages --extra dev --verbose
      - run:
          name: "Verify Installation (Optional)"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            pytest --version
            mypy --version
            coverage --version
      - persist_to_workspace:
          root: .
          paths:
            - .
  
  # Job 2: Linting and formatting checks
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Run linting and formatting checks"
          command: |
            source .venv/bin/activate
            ruff check .
  
  # Job 3: Run unit tests and get coverage
  unit_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and create test results directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
      - run:
          name: "Execute unit test suite"
          command: |
            source .venv/bin/activate  
            pytest components/ --cov=components --cov-report=xml --cov-report=term \
                     --junitxml=test-results/unit/junit.xml \
                     --cov-fail-under=84
      - run:
          name: "Run Static Analysis (mypy)"
          command: |
            source .venv/bin/activate
            uv add types-requests
            mypy components/ --explicit-package-bases
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: coverage.xml
      - store_artifacts:
          path: test-results/unit
  
  # Job 4: CircleCI Integration Tests (All Tests Except Local Credentials)
  circleci_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/circleci
      - run:
          name: "Execute All Tests Except Local Credentials"
          command: |
            source .venv/bin/activate
            pytest components/ tests/ -m "not local_credentials" \
                   --junitxml=test-results/circleci/junit.xml -v \
                   --cov=components --cov-report=term
      - store_test_results:
          path: test-results/circleci
      - store_artifacts:
          path: test-results/circleci

  # Job 5: Integration Tests with Real Credentials
  integration_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Verify Environment Variables"
          command: |
            echo "Checking for required environment variables..."
            if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_API_TOKEN" ] || [ -z "$JIRA_USER_EMAIL" ]; then
              echo "WARNING: Missing Jira environment variables. Integration tests may be skipped."
              echo "Required: JIRA_BASE_URL, JIRA_API_TOKEN, JIRA_USER_EMAIL"
            else
              echo "All required environment variables are present."
            fi
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
      - run:
          name: "Execute Integration Test Suite with Real API Calls"
          command: |
            source .venv/bin/activate
            pytest -m "integration and not local_credentials" \
                   --junitxml=test-results/integration/junit.xml -v \
                   --no-cov
      - store_test_results:
          path: test-results/integration
      - store_artifacts:
          path: test-results/integration

  # Job 6: Deploy to AWS Lambda
  deploy:
    docker:
      - image: cimg/python:3.12
    environment:
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Install AWS CLI & uv"
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
      - run:
          name: "Package Lambda zip"
          command: |
            export PATH="$HOME/.cargo/bin:$PATH"
            source .venv/bin/activate
            mkdir -p lambda_package/jira_service
            # Copy jira_service as a package (preserves internal imports)
            cp components/jira_service/src/jira_service/*.py \
              lambda_package/jira_service/
            # Ensure it's a proper package
            touch lambda_package/jira_service/__init__.py
            # Copy handler.py to root so Lambda can find it
            cp components/jira_service/src/jira_service/main.py lambda_package/
            cp components/jira_service/src/jira_service/handler.py \
              lambda_package/handler.py
            # Copy other local packages
            cp -r components/jira_client_impl/src/jira_client_impl \
              lambda_package/jira_client_impl
            cp -r components/work_mgmt_client_interface/src/work_mgmt_client_interface \
              lambda_package/work_mgmt_client_interface
            cp -r components/jira_service_adapter/src/jira_service_adapter \
              lambda_package/jira_service_adapter
            # Install PyPI dependencies
            uv pip install mangum fastapi httpx python-dotenv requests \
              "pydantic==2.10.6" "pydantic-core==2.27.2" \
              --python-platform x86_64-unknown-linux-gnu \
              --python 3.12 \
              -t lambda_package/
            echo "--- lambda_package contents ---"
            ls -la lambda_package/
            ls -la lambda_package/jira_service/
            find lambda_package/ -name "_pydantic_core*.so" | head -5
            cd lambda_package && zip -r ../deployment.zip . && cd ..
            ls -la deployment.zip
      - run:
          name: "Deploy to AWS Lambda"
          command: |
            aws lambda update-function-configuration \
              --function-name team-diamonds-deployment \
              --runtime python3.12 \
              --region us-east-2 \
              > /dev/null
            aws lambda update-function-code \
              --function-name team-diamonds-deployment \
              --zip-file fileb://deployment.zip \
              --region us-east-2 \
              > /dev/null
            aws lambda wait function-updated \
              --function-name team-diamonds-deployment \
              --region us-east-2
            echo "Lambda deploy complete."
      - run:
          name: "Verify /health endpoint"
          command: |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $API_GATEWAY_URL/health)
            [ "$STATUS" = "200" ] && echo "Health check passed!" || (echo "Health check failed: $STATUS" && exit 1)

  # Job 7: Report Summary
  report_summary:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Summarize Unit Test Results"
          command: |
            echo "--- Unit Test Summary ---"
            if [ -f test-results/unit/junit.xml ]; then
              echo "Unit test results file found."
              if command -v xmllint > /dev/null; then
                tests=$(xmllint --xpath "string(//testsuite/@tests)" test-results/unit/junit.xml 2>/dev/null || echo "N/A")
                failures=$(xmllint --xpath "string(//testsuite/@failures)" test-results/unit/junit.xml 2>/dev/null || echo "N/A")
                echo "Tests: $tests, Failures: $failures"
              fi
            else
              echo "Unit test results file not found."
            fi
      - run:
          name: "Summarize CircleCI Test Results"
          command: |
            echo "--- CircleCI Test Summary ---"
            if [ -f test-results/circleci/junit.xml ]; then
              echo "CircleCI test results file found."
            else
              echo "CircleCI test results file not found."
            fi
      - run:
          name: "Summarize Integration Test Results"
          command: |
            echo "--- Integration Test Summary ---"
            if [ -f test-results/integration/junit.xml ]; then
              echo "Integration test results file found."
            else
              echo "Integration test results file not found."
            fi
      - run:
          name: "Display Coverage Info"
          command: |
            echo "--- Coverage Summary ---"
            if [ -f coverage.xml ]; then
              echo "Coverage XML found. Check artifacts for details."
              if command -v xmllint > /dev/null; then
                coverage_rate=$(xmllint --xpath "string(//coverage/@line-rate)" coverage.xml 2>/dev/null || echo "N/A")
                echo "Line Coverage Rate: $coverage_rate"
              fi
            else
              echo "Coverage XML not found."
            fi

workflows:
  # Runs on all branches except main and develop
  build_and_test:
    jobs:
      - build:
          filters:
            branches:
              ignore:
                - main
                - develop
      - lint:
          requires:
            - build
          filters:
            branches:
              ignore:
                - main
                - develop
      - unit_test:
          requires:
            - build
          filters:
            branches:
              ignore:
                - main
                - develop
      - circleci_test:
          requires:
            - unit_test
          filters:
            branches:
              ignore:
                - main
                - develop
      - report_summary:
          requires:
            - unit_test
            - circleci_test
          filters:
            branches:
              ignore:
                - main
                - develop

  # Full tests + deploy on HW-2 and main
  full_integration:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - lint:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - unit_test:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - circleci_test:
          requires:
            - unit_test
          context: jira-client
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - integration_test:
          requires:
            - circleci_test
          context: jira-client
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - report_summary:
          requires:
            - unit_test
            - circleci_test
            - integration_test
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI
      - deploy:
          requires:
            - report_summary
          context: aws-deploy
          filters:
            branches:
              only:
                - main
                - HW-2
                - chz9577-hw3-AI