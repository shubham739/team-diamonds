[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jira-service-api-client"
version = "1.0.0"
description = "Auto-generated type-safe client for the Jira FastAPI service"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.20.0",
    "attrs>=22.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["jira_service_api_client"]